# Yato (Yet Another Tmux Orchestrator) Default Configuration

# Default session name for orchestrator
DEFAULT_SESSION="yato"

# Default window for orchestrator
DEFAULT_ORCHESTRATOR_WINDOW="0"

# Log directory (relative to project root)
LOG_DIR=".yato/logs"

# Agent registry is now per-workflow in .workflow/*/agents.yml
# (global registry.json no longer used)

# Default check-in interval in minutes
DEFAULT_CHECKIN_MINUTES=15

# Message types for notify-pm.sh
MESSAGE_TYPES="DONE,BLOCKED,HELP,STATUS,PROGRESS"

# Agent roles
AGENT_ROLES="orchestrator,pm,developer,qa,devops,reviewer,researcher,writer"

# Tmux settings
TMUX_HISTORY_LIMIT=10000

# Message suffix appended to PM/orchestrator → agent messages (yato-level)
PM_TO_AGENTS_SUFFIX="
- [REMINDER] Always read and update your agent-tasks.md with your progress.
- [REMINDER] Always create a tasks list.
- [REMINDER] Read your identity.yml.
- [REMINDER] Read your instructions.md.
- [REMINDER] Read your constraints.md."

# Message suffix appended to agent → PM messages (yato-level)
AGENTS_TO_PM_SUFFIX="
- [REMINDER] Always keep tasks.json updated.
- [REMINDER] Always distribute work to the correct agents.
- [REMINDER] Read your identity.yml.
- [REMINDER] Read your instructions.md.
- [REMINDER] Read your constraints.md."

# Message suffix appended to check-in daemon → PM messages (yato-level)
CHECKIN_TO_PM_SUFFIX="
- [REMINDER] Always keep tasks.json updated.
- [REMINDER] Always distribute work to the correct agents, don't do work yourself, you're the PM and MUST ONLY do PM work.
- [REMINDER] Read your identity.yml.
- [REMINDER] Read your instructions.md.
- [REMINDER] Read your constraints.md."

# Message suffix injected into PM context when user submits a prompt (yato-level)
USER_TO_PM_SUFFIX="
- [REMINDER] Always keep the tasks.json updated.
- [REMINDER] Always update first the workflow tasks.json when a new request comes in, then the agent-tasks.json, then tell the agents.
- [REMINDER] Break down the tasks as much as possible.
- [REMINDER] Always distribute work to the correct agents, don't do work yourself, you're the PM and MUST ONLY do PM work."

# Wait times (in seconds)
CLAUDE_STARTUP_WAIT=5
MESSAGE_SEND_WAIT=0.5
COMMAND_EXEC_WAIT=2
